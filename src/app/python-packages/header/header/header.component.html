<ibm-header (click)="onRenderHome()" name="{{ _messageService.getBundle('PROJECT_NAME') }}" role="banner" [attr.aria-label]="_messageService.getBundle('PROJECT_NAME')">
  <ibm-header-navigation ariaLabel="Main navigation">
    <ibm-header-item
      (click)="onRenderGetStarted($event)"
      (keydown.enter)="onRenderGetStarted($event)"
      (keydown.space)="onRenderGetStarted($event)">
      {{ _messageService.getBundle('GET_STARTED') }}
    </ibm-header-item>

    <ibm-header-item
      (click)="onRenderResources($event)"
      (keydown.enter)="onRenderResources($event)"
      (keydown.space)="onRenderResources($event)">
      {{ _messageService.getBundle('RESOURCES') }}
    </ibm-header-item>
  </ibm-header-navigation>
</ibm-header>
